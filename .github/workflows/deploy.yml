name: ERP Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to OCI Production
    runs-on: ubuntu-latest

    steps:
      ###########################################################
      # Checkout
      ###########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ###########################################################
      # Build Frontend
      ###########################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      ###########################################################
      # Configure SSH
      ###########################################################

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      ###########################################################
      # Upload Frontend Build
      ###########################################################

      - name: Upload Frontend Build
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
          "mkdir -p /tmp/frontend-build"

          scp -r frontend/dist/* \
          ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/frontend-build/

      ###########################################################
      # Deploy
      ###########################################################

      - name: Deploy Application
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'

          set -e

          echo "========== Updating Repository =========="

          cd ~/learnspace-application

          git fetch origin

          git reset --hard origin/main

          echo "========== Backend =========="

          cd ~/learnspace-application/erp-backend

          source venv/bin/activate

          pip install --upgrade pip

          pip install -r requirements.txt

          echo "Checking Python syntax..."

          python -m compileall .

          echo "Restarting Gunicorn..."

          sudo systemctl restart gunicorn

          echo "========== Frontend =========="

          sudo rm -rf /var/www/frontend/*

          sudo cp -r /tmp/frontend-build/* /var/www/frontend/

          sudo rm -rf /tmp/frontend-build

          sudo systemctl reload nginx

          echo "========== Deployment Finished =========="

          EOF

      ###########################################################
      # Verify Services
      ###########################################################

      - name: Verify Gunicorn
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
          "systemctl is-active --quiet gunicorn"

      - name: Verify Nginx
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
          "systemctl is-active --quiet nginx"

      ###########################################################
      # Health Check
      ###########################################################

      - name: Verify Application Health
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
          "curl -fsS http://127.0.0.1:8001/health"