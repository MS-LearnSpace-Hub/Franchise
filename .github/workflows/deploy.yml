name: ERP Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to OCI Production
    runs-on: ubuntu-latest

    steps:

      ###########################################################
      # Checkout
      ###########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ###########################################################
      # Build Frontend
      ###########################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      ###########################################################
      # Debug Secrets (Temporary)
      ###########################################################

      - name: Debug Secrets
        env:
          HOST: ${{ secrets.LEARNSPACEVM_HOST }}
          USER: ${{ secrets.LEARNSPACEVM_USER }}
          KEY: ${{ secrets.LEARNSPACEVM_KEY }}
        run: |
          echo "HOST length: ${#HOST}"
          echo "USER length: ${#USER}"
          echo "KEY length: ${#KEY}"

      ###########################################################
      # Configure SSH
      ###########################################################

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.LEARNSPACEVM_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.LEARNSPACEVM_HOST }}" >> ~/.ssh/known_hosts

      ###########################################################
      # Upload Frontend
      ###########################################################

      - name: Upload Frontend Build
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.LEARNSPACEVM_USER }}@${{ secrets.LEARNSPACEVM_HOST }} \
          "mkdir -p /tmp/frontend-build"

          scp -o StrictHostKeyChecking=no \
          -r frontend/dist/* \
          ${{ secrets.LEARNSPACEVM_USER }}@${{ secrets.LEARNSPACEVM_HOST }}:/tmp/frontend-build/

      ###########################################################
      # Deploy Backend + Frontend
      ###########################################################

      - name: Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.LEARNSPACEVM_USER }}@${{ secrets.LEARNSPACEVM_HOST }} << 'EOF'

          set -e

          echo "========== Updating Repository =========="

          cd ~/learnspace-application

          git fetch origin

          git reset --hard origin/main

          echo "========== Backend =========="

          cd ~/learnspace-application/erp-backend

          source venv/bin/activate

          pip install --upgrade pip

          pip install -r requirements.txt

          echo "Checking Python syntax..."

          python -m compileall .

          echo "Restarting Gunicorn..."

          sudo systemctl restart gunicorn

          echo "========== Frontend =========="

          sudo rm -rf /var/www/frontend/*

          sudo cp -r /tmp/frontend-build/* /var/www/frontend/

          sudo rm -rf /tmp/frontend-build

          sudo systemctl reload nginx

          echo "========== Deployment Finished =========="

          EOF

      ###########################################################
      # Verify Gunicorn
      ###########################################################

      - name: Verify Gunicorn
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.LEARNSPACEVM_USER }}@${{ secrets.LEARNSPACEVM_HOST }} \
          "systemctl is-active --quiet gunicorn"

      ###########################################################
      # Verify Nginx
      ###########################################################

      - name: Verify Nginx
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.LEARNSPACEVM_USER }}@${{ secrets.LEARNSPACEVM_HOST }} \
          "systemctl is-active --quiet nginx"

      ###########################################################
      # Health Check
      ###########################################################

      #- name: Verify Application Health
        #run: |
          #ssh -o StrictHostKeyChecking=no \
          #${{ secrets.LEARNSPACEVM_USER }}@${{ secrets.LEARNSPACEVM_HOST }} \
          #"curl -fsS http://127.0.0.1:8001/health"